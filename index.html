<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CineVerse - Movies & Trailers</title>

<meta name="description" content="Watch trending movies, trailers, ratings and reviews on CineVerse.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="style.css">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3998246380817730"
crossorigin="anonymous"></script>
</head>

<body>

<header>
  <div class="logo">🎬 CineVerse</div>

  <nav>
    <a href="#">Home</a>
    <a href="#">Movies</a>
  </nav>

  <input type="text" id="searchInput" placeholder="Search movies...">

  <div class="lang-switch">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('hi')">HI</button>
    <button onclick="setLang('ur')">UR</button>
  </div>
</header>

<section class="hero-banner">
  <h1 id="main-title">Discover Amazing Movies</h1>
  <p id="sub-title">Watch trailers, ratings & trending films</p>
</section>

<section class="featured">
  <h2>⭐ Featured</h2>
  <div class="movie-grid" id="movie-grid"></div>
</section>

<!-- TRAILER MODAL -->
<div id="trailerModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeTrailer()">✖</span>
    <iframe id="trailerFrame" frameborder="0" allowfullscreen></iframe>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
